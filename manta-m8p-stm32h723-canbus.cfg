#####################################################################
#   UUID Setting
#####################################################################
[mcu]
#serial: /dev/serial/by-id/-
canbus_uuid:17d9d5cd0b0b

[mcu CB2]
serial: /tmp/klipper_host_mcu

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on MOTOR1 ('B' Motor rear left)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 400
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
##--------------------------------------------------------------------
homing_speed: 40   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PC13
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
diag1_pin: ^!PF4
interpolate: True
#hold_current: 0.4
run_current: 0.800 #1.414
sense_resistor: 0.075
#stealthchop_threshold: 999999 #Range: 0 -- 999999
driver_SGT: 1 #Range: -64 -- 63 (-64 is most sensitive value, 63 is least sensitive)

## Y Stepper on MOTOR2 ('A' Motor rear right)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 400
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
##--------------------------------------------------------------------
homing_speed: 40	#MAX 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE3
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
diag1_pin: ^!PF3
interpolate: True
#hold_current: 0.4
run_current: 0.800 #1.414
sense_resistor: 0.075
#stealthchop_threshold: 999999 #Range: 0 -- 999999
driver_SGT: 1 #Range: -64 -- 63 (-64 is most sensitive value, 63 is least sensitive)

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR4
[stepper_z]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:20
microsteps: 16
#endstop_pin: ^PD13
endstop_pin: probe:z_virtual_endstop
position_max: 340
##--------------------------------------------------------------------
position_min: -5
#position_endstop: 0
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2240 stepper_z]
cs_pin: PB5
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
interpolate: True
run_current: 0.800 #1.414
stealthchop_threshold: 0


##	Z1 Stepper - Rear Left on MOTOR5
[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:20
microsteps: 16

[tmc2240 stepper_z1]
cs_pin: PG14
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
interpolate: True
run_current: 0.800 #1.414
stealthchop_threshold: 0


##	Z2 Stepper - Rear Right on MOTOR7
[stepper_z2]
step_pin: PD4
dir_pin: PD3
enable_pin: !PD6
rotation_distance: 40
gear_ratio: 80:20
microsteps: 16

[tmc2240 stepper_z2]
cs_pin: PD5
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
interpolate: True
run_current: 0.800 #1.414
stealthchop_threshold: 0


##	Z3 Stepper - Front Right on MOTOR8
[stepper_z3]
step_pin: PC7
dir_pin: !PC8
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:20
microsteps: 16

[tmc2240 stepper_z3]
cs_pin: PC6
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
interpolate: True
run_current: 0.800 #1.414
stealthchop_threshold: 0

#####################################################################
# 	Heater Bed Settings
#####################################################################

[heater_bed]
heater_pin: PF5
sensor_pin: PB1 # TB 
sensor_type: ATC Semitec 104GT-2
max_power: 1.0 #220v = 0.436
min_temp: 0
max_temp: 120
control: pid
pid_kp: 73.384
pid_ki: 1.754
pid_kd: 767.784

[temperature_sensor Manta_MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#[temperature_sensor Manta_CB2]
#sensor_type: temperature_host
#min_temp: 0
#max_temp: 100

[temperature_fan Manta_CB2]
pin: CB2:gpiochip0/gpio19 #Pi-FAN
kick_start_time: 1.0
off_below: 0.1
max_power: 1.0
sensor_type: temperature_host
control: watermark
#control: pid
min_temp: 10
max_temp: 85
#pid_kp: 1.0
#pid_ki: 0.5
#pid_kd: 2.0
min_speed: 0.1
max_speed: 1.0
target_temp: 40

